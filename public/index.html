<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AssignDash — Your Syllabus, Your Dashboard</title>
  <link rel="stylesheet" href="style.css?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="landing">
    <!-- Hero -->
    <section class="hero">
      <div class="hero-inner">
        <h1 class="hero-title">📚 <span class="gradient-text">AssignDash</span></h1>
        <p class="hero-sub">Upload your syllabuses, spreadsheets, or schedules. Get a beautiful assignment dashboard in seconds.</p>
        <div class="hero-features">
          <div class="hf"><span class="hf-icon">📄</span> Upload PDFs, spreadsheets, images, calendars, or paste text</div>
          <div class="hf"><span class="hf-icon">🤖</span> AI extracts every deadline automatically</div>
          <div class="hf"><span class="hf-icon">📊</span> Timeline, calendar & class views</div>
        </div>
        <button class="hero-cta" id="getStartedBtn">Get Started — It's Free</button>
      </div>
    </section>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="authModal">
      <div class="modal-card">
        <button class="modal-close" id="modalClose">&times;</button>
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Log In</button>
          <button class="auth-tab" data-tab="signup">Sign Up</button>
        </div>

        <form class="auth-form" id="loginForm">
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required autocomplete="current-password" />
          </div>
          <div class="form-error" id="loginError"></div>
          <button type="submit" class="form-submit">Log In</button>
        </form>

        <form class="auth-form" id="signupForm" style="display:none">
          <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required autocomplete="name" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required minlength="6" autocomplete="new-password" />
          </div>
          <div class="form-error" id="signupError"></div>
          <button type="submit" class="form-submit">Create Account</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const modal = document.getElementById('authModal');
      const getStartedBtn = document.getElementById('getStartedBtn');
      const closeBtn = document.getElementById('modalClose');
      const tabs = document.querySelectorAll('.auth-tab');
      const loginForm = document.getElementById('loginForm');
      const signupForm = document.getElementById('signupForm');

      getStartedBtn.addEventListener('click', () => modal.classList.add('open'));
      closeBtn.addEventListener('click', () => modal.classList.remove('open'));
      modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          loginForm.style.display = tab.dataset.tab === 'login' ? 'flex' : 'none';
          signupForm.style.display = tab.dataset.tab === 'signup' ? 'flex' : 'none';
          document.getElementById('loginError').textContent = '';
          document.getElementById('signupError').textContent = '';
        });
      });

      loginForm.addEventListener('submit', async e => {
        e.preventDefault();
        const errEl = document.getElementById('loginError');
        errEl.textContent = '';
        const fd = new FormData(loginForm);
        const btn = loginForm.querySelector('.form-submit');
        btn.disabled = true;
        btn.textContent = 'Logging in...';
        try {
          const r = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: fd.get('email'), password: fd.get('password') })
          });
          const data = await r.json();
          if (!r.ok) throw new Error(data.error);
          window.location.href = '/dashboard';
        } catch (err) {
          errEl.textContent = err.message;
          btn.disabled = false;
          btn.textContent = 'Log In';
        }
      });

      signupForm.addEventListener('submit', async e => {
        e.preventDefault();
        const errEl = document.getElementById('signupError');
        errEl.textContent = '';
        const fd = new FormData(signupForm);
        const btn = signupForm.querySelector('.form-submit');
        btn.disabled = true;
        btn.textContent = 'Creating account...';
        try {
          const r = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: fd.get('name'), email: fd.get('email'), password: fd.get('password') })
          });
          const data = await r.json();
          if (!r.ok) throw new Error(data.error);
          window.location.href = '/dashboard';
        } catch (err) {
          errEl.textContent = err.message;
          btn.disabled = false;
          btn.textContent = 'Create Account';
        }
      });
    })();
  </script>
</body>
</html>
